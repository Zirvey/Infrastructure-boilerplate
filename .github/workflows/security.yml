name: Security Scan

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
  schedule:
    # Run security scans weekly on Mondays at 09:00 UTC
    - cron: "0 9 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  # ── Terraform Security (tfsec) ────────────────────────────
  tfsec:
    name: Terraform Security (tfsec)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        id: tfsec
        uses: aquasecurity/tfsec-action@v1.28.0
        with:
          soft_fail: true

      - name: Upload tfsec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

  # ── Filesystem Security (Trivy) ──────────────────────────
  trivy:
    name: Filesystem Security (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        id: trivy
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on Trivy findings
        if: steps.trivy.outcome == 'failure'
        run: echo "::error::Trivy found critical or high vulnerabilities. Check the scan output above." && exit 1

  # ── Kubernetes Security (kube-score) ─────────────────────
  kube-score:
    name: Kubernetes Security (kube-score)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kube-score
        run: |
          curl -Lo kube-score https://github.com/zegl/kube-score/releases/download/v1.17.0/kube-score_1.17.0_linux_amd64
          chmod +x kube-score
          sudo mv kube-score /usr/local/bin/

      - name: Run kube-score
        run: |
          kube-score score kubernetes/base/*.yaml \
            --output-format ci \
            --ignore-test pod-networkpolicy \
            --ignore-test container-resources \
            --ignore-test container-image-tag \
            --ignore-test container-user-not-low \
            --ignore-test container-group-not-low \
            --ignore-test deployment-host-anti-affinity

  # ── IaC Policy Checks (Checkov) ──────────────────────────
  checkov:
    name: IaC Policy (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,dockerfile,kubernetes,secrets
          soft_fail: true
          output-format: cli

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('checkov-results.sarif') != ''
        with:
          sarif_file: checkov-results.sarif

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: application-prod

namePrefix: prod-

patches:
  - target:
      kind: Deployment
      name: app-deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: add
        path: /spec/strategy
        value:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1

  # Add pod disruption budget for production
  - target:
      kind: Deployment
      name: app-deployment
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app-deployment
        annotations:
          cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

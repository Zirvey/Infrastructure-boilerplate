# Example encrypted secrets file
# Encrypt with: sops -e -i environments/prod/secrets.enc.yml
# Edit with:    sops environments/prod/secrets.enc.yml

# Database credentials
db_password: ENC[AES256_GCM,data:...,type:str]
db_root_password: ENC[AES256_GCM,data:...,type:str]

# Application secrets
app_secret_key: ENC[AES256_GCM,data:...,type:str]
api_key: ENC[AES256_GCM,data:...,type:str]

# TLS/SSL
tls_private_key: ENC[AES256_GCM,data:...,type:str]

# Grafana admin
grafana_admin_password: ENC[AES256_GCM,data:...,type:str]

# Docker registry
registry_password: ENC[AES256_GCM,data:...,type:str]

sops:
    kms: []
    gcp_kms: []
    azure_kv: []
    hc_vault: []
    age:
        - recipient: age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
            ...
            -----END AGE ENCRYPTED FILE-----
    lastmodified: "2025-04-08T00:00:00Z"
    mac: ENC[AES256_GCM,data:...,type:str]
    pgp: []
    unencrypted_suffix: _unencrypted
    version: 3.8.1
